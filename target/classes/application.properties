# Configuración general de RUPE para Railway
spring.application.name=RUPE

# Railway asigna el puerto automáticamente mediante la variable PORT
server.port=${PORT:8080}

# Base de datos MySQL en Railway
# Railway proporciona estas variables cuando agregas el servicio MySQL:
# MYSQLHOST, MYSQLPORT, MYSQLDATABASE, MYSQLUSER y MYSQLPASSWORD
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# Crear/actualizar tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# Dialecto de MySQL para Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Desactivar cache de vistas
spring.thymeleaf.cache=false

# Manejo de errores
server.error.whitelabel.enabled=false
