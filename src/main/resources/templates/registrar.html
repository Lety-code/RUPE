<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>RUPE</title><link rel="stylesheet" th:href="@{/css/styles.css}"></head><body><header><h1>RUPE</h1><p>Sistema RUPE para registrar perros extraviados y consultar reportes.</p></header><nav><a th:href="@{/}">Inicio</a><a th:href="@{/reportes/nuevo}">Registrar</a><a th:href="@{/reportes/consulta}">Consultar</a><a th:href="@{/admin/login}">Administrador</a></nav><div class="container"><h2>Registrar perro</h2><form th:action='@{/reportes/guardar}' method='post' th:object='${reporte}'><h3>Tutor</h3><label>Nombre</label><input th:field='*{tutor.nombre}' required><label>Teléfono</label><input th:field='*{tutor.telefono}' required><h3>Perro</h3><label>Nombre</label><input th:field='*{perro.nombre}' required><label>Color</label><input th:field='*{perro.color}' required><label>Señas</label><textarea th:field='*{perro.senasParticulares}'></textarea><h3>Extravío</h3><label>Fecha</label><input type='date' th:field='*{fechaExtravio}'><label>Lugar</label><input th:field='*{lugarExtravio}' required><button>Guardar</button></form></div><footer>RUPE - Proyecto Terminal II</footer></body></html>
